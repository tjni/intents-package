---
name: Release (PyPI + GitHub)

on:
  push:
    tags:
      - "*.*.*" # e.g. 2026.6.24 (no leading "v")

jobs:
  build:
    runs-on: ubuntu-latest
    # Needs write access to push the submodule bump to the default branch and
    # to move the release tag onto that commit.
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.read_ver.outputs.tag }}
      file_ver: ${{ steps.read_ver.outputs.file_ver }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          # Full history so the commit can be pushed to the default branch
          # (shallow clones reject pushes).
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install build black "pyyaml>=6,<7" tomli

      - name: Read version from pyproject.toml & verify tag
        id: read_ver
        shell: python
        run: |
          import os, sys
          try:
              import tomllib as toml   # Python 3.11+
          except Exception:
              import tomli as toml     # fallback

          # Read pyproject version
          with open("pyproject.toml", "rb") as f:
              ver = toml.load(f)["project"]["version"]

          # Extract tag from GITHUB_REF (e.g. "refs/tags/2026.6.24" -> "2026.6.24")
          ref = os.environ["GITHUB_REF"]
          prefix = "refs/tags/"
          if not ref.startswith(prefix):
              print(f"Unexpected GITHUB_REF: {ref}", file=sys.stderr)
              sys.exit(1)
          tag = ref[len(prefix):]

          if tag != ver:
              print(f"❌ Tag ({tag}) != pyproject.toml ({ver})", file=sys.stderr)
              sys.exit(1)

          # Expose outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"tag={tag}\n")
              fh.write(f"file_ver={ver}\n")

          print(f"✅ Version OK: tag={tag} matches pyproject.toml={ver}")

      - name: Bump intents submodule to release tag
        # Positions the submodule at the tag and commits the pointer change
        # locally (detached HEAD). Not pushed yet — only after the build and
        # sanity checks below pass.
        env:
          TAG: ${{ steps.read_ver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./script/bump-intents "${TAG}"

      - name: Build dists & run sanity checks
        # script/package regenerates data from the (now bumped) intents
        # submodule, builds the wheel/sdist into dist/, and runs the pytest
        # sanity check against the freshly built wheel.
        run: ./script/package

      - name: Push submodule bump & move tag onto it
        # Reached only after a green build+sanity run, so the released tag and
        # the default branch always point at the exact commit that produced the
        # published artifacts. Uses GITHUB_TOKEN, which does not re-trigger this
        # workflow on the tag push.
        env:
          TAG: ${{ steps.read_ver.outputs.tag }}
        run: |
          set -euo pipefail
          default_branch="$(git remote show origin | sed -n 's/.*HEAD branch: //p')"
          echo "Pushing bump to ${default_branch} and moving tag ${TAG}"
          # Fast-forwards the default branch by the bump commit (no-op if the
          # submodule was already at the tag).
          git push origin "HEAD:refs/heads/${default_branch}"
          git push --force origin "HEAD:refs/tags/${TAG}"

      - name: Upload dists
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/*

  changelog:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract release notes (fall back to auto-generated)
        shell: python
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          import os, re, pathlib
          ver = os.environ["TAG"]                          # e.g., 2026.6.24
          chlog_path = pathlib.Path("CHANGELOG.md")

          def extract():
              if not chlog_path.exists():
                  return None
              lines = chlog_path.read_text(encoding="utf-8").splitlines()

              def is_heading_for_version(s: str) -> bool:
                  s = s.strip()
                  if not s.startswith("##"):
                      return False
                  s = s[2:].strip()                  # drop "##"
                  s = s.strip("[]")                  # allow [2026.6.24]
                  s = re.sub(r"\s*-\s*.*$", "", s)   # drop " - date"
                  s = s.lstrip("v")                  # allow v-prefixed
                  return s == ver

              start_idx = None
              for i, line in enumerate(lines):
                  if is_heading_for_version(line):
                      start_idx = i + 1              # start AFTER heading
                      break
              if start_idx is None:
                  return None

              end_idx = len(lines)
              for j in range(start_idx, len(lines)):
                  if lines[j].lstrip().startswith("## "):
                      end_idx = j
                      break

              section_lines = lines[start_idx:end_idx]
              while section_lines and not section_lines[0].strip():
                  section_lines.pop(0)
              while section_lines and not section_lines[-1].strip():
                  section_lines.pop()

              section = "\n".join(section_lines)
              only_links = re.fullmatch(
                  r"(?:\[[^\]]+\]:\s*\S+\s*(?:\n|$))*", section or "", flags=re.MULTILINE
              )
              if not section or only_links:
                  return None
              return section

          section = extract()
          if section:
              print(f"Using CHANGELOG.md section for {ver}")
              pathlib.Path("RELEASE_NOTES.md").write_text(section, encoding="utf-8")
          else:
              print(f"No usable CHANGELOG.md section for {ver}; "
                    "GitHub will auto-generate release notes")
              # Empty file signals the release job to auto-generate notes
              pathlib.Path("RELEASE_NOTES.md").write_text("", encoding="utf-8")

      - name: Upload release notes
        uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  publish:
    needs: [build, changelog]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  github_release:
    needs: [publish, changelog]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v6
        with:
          name: release-notes
          path: .

      - name: Decide release-notes mode
        id: notes
        run: |
          set -euo pipefail
          if [ -s RELEASE_NOTES.md ]; then
            echo "generate=false" >> "$GITHUB_OUTPUT"
          else
            # Empty notes -> let GitHub auto-generate
            rm -f RELEASE_NOTES.md
            echo "generate=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.generate == 'false' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.generate }}
          files: |
            dist/*
